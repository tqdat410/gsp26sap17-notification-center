# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.gsp26.sap17.nc.notificationcenter
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://s40lp1.ucc.cit.tum.de/
          client: '324'
        app:
          name: Z17_NOTI_CENTER
          description: Custom Notification Center Fiori Application
          package: ZGSP26SAP17
          transport: S40K915973
        exclude:
          - /test/
